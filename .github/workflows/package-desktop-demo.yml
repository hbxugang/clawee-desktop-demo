name: package-desktop-demo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            asset_name: macos-x64
            package_target: mac-x64
          - os: macos-14
            asset_name: macos-arm64
            package_target: mac-arm64
          - os: windows-latest
            asset_name: windows-portable
            package_target: win-portable
          - os: ubuntu-latest
            asset_name: linux
            package_target: linux-dir
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout openclaw-demo
        uses: actions/checkout@v4
        with:
          repository: hbxugang/openclaw-demo
          ref: main
          path: openclaw-demo

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install openclaw-demo dependencies
        working-directory: openclaw-demo
        run: npm ci

      - name: Package desktop demo
        env:
          OPENCLAW_DEMO_ROOT: openclaw-demo
          CLAWEE_DESKTOP_PACKAGE_TARGET: ${{ matrix.package_target }}
        run: pnpm desktop:package

      - name: Archive packaged output
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          mkdir -p release-assets
          python - <<'PY'
          import os
          import pathlib
          import zipfile

          source_root = pathlib.Path("apps/desktop/out")
          asset_name = os.environ["ASSET_NAME"]
          zip_path = pathlib.Path("release-assets") / f"clawee-desktop-demo-{asset_name}.zip"

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(source_root.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(source_root))
          print(f"Created {zip_path}")
          PY

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: release-assets/clawee-desktop-demo-${{ matrix.asset_name }}.zip
          if-no-files-found: error

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.asset_name }}
          path: apps/desktop/out/**
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1 || gh release create "$TAG_NAME" --repo "$GH_REPO" --generate-notes
          gh release upload "$TAG_NAME" release-assets/*.zip --repo "$GH_REPO" --clobber
